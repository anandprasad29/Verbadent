# Dental Items Metadata
# This file is the source of truth for all dental items in the app.
# Edit this file to add, remove, or modify dental items.
# After editing, run: dart run tool/generate_dental_items.dart

# All dental items available in the app
dental_items:
  # Dental visit scenarios
  - id: dentist-chair
    image: dentist_chair.webp
    caption: "This is the dentist's chair"

  - id: dentist-mask
    image: dentist_mask.webp
    caption: The dentist wears a mask

  - id: dentist-gloves
    image: dentist_gloves.webp
    caption: The dentist wears a glove

  - id: bright-light
    image: bright_light.webp
    caption: The dentist has a bright light

  - id: count-teeth
    image: count_teeth.webp
    caption: The dentist will count your teeth

  # Dental tools and actions
  - id: dental-mirror
    image: dental_mirror.webp
    caption: This is a mirror

  - id: dental-drill
    image: dental_drill.webp
    caption: "This is the dentist's drill"

  - id: suction
    image: suction.webp
    caption: This is a suction

  - id: open-mouth
    image: open_mouth.webp
    caption: Open your mouth

  - id: stop
    image: stop.webp
    caption: Stop

# IDs for the "Before Visit" story sequence
# These items are shown in a horizontal flow with arrows
before_visit_story:
  - dentist-chair
  - dentist-mask
  - dentist-gloves
  - bright-light
  - count-teeth

# IDs for the "Before Visit" tools grid
# These items are shown in a grid layout
before_visit_tools:
  - dental-mirror
  - dental-drill
  - suction
  - open-mouth
  - stop
